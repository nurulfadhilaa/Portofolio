<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portofolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    body {
      background-color: #f3f4f6;
      font-family: 'Poppins', sans-serif;
    }

    header {
      background-color: #374151;
      color: white;
    }
  </style>
</head>
<body>
<header class="py-4 fixed top-0 w-full z-50">
    <div class="container mx-auto px-6">
    <div class="flex justify-between items-center">
      <button id="burger-btn" class="text-white text-2xl md:hidden focus:outline-none">
        <i class="fas fa-bars"></i>
      </button>
      <nav class="hidden md:flex space-x-4">
        <a class="hover:underline" href="index.html">ABOUT</a>
        <a class="hover:underline" href="pendidikan.html">EDUCATION</a>
        <a class="hover:underline" href="skills.html">SKILLS</a>
        <a class="font-bold hover:underline" href="certification.html">CERTIFICATION</a>
        <a class="hover:underline" href="project.html">PROJECT</a>
        <a class="hover:underline" href="contact.html">CONTACT</a>
      </nav>
      <span class="text-lg hidden md:block text-white font-semibold">Nurul Fadhila, S.T</span>
    </div>
    <div id="mobile-menu" class="hidden mt-4 md:hidden flex flex-col space-y-2">
      <a class="hover:underline" href="index.html">ABOUT</a>
      <a class="hover:underline" href="pendidikan.html">EDUCATION</a>
      <a class="hover:underline" href="skills.html">SKILLS</a>
      <a class="hover:underline" href="certification.html">CERTIFICATION</a>
      <a class="hover:underline" href="project.html">PROJECT</a>
      <a class="hover:underline" href="contact.html">CONTACT</a>
    </div>
        <script>
        document.addEventListener('DOMContentLoaded', function () {
            const burgerBtn = document.getElementById('burger-btn');
            const mobileMenu = document.getElementById('mobile-menu');
            burgerBtn.addEventListener('click', function () {
                mobileMenu.classList.toggle('hidden');
            });
        });
    </script>
  </div>
</header>


</body>
</html>
