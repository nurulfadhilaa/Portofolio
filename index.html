<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Portofolio Nurul Fadhila</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="style.css">
</head>

<body class="opacity-0 transition-opacity duration-300">

<!-- NAVBAR -->
<header class="fixed top-4 left-1/2 -translate-x-1/2 z-50 w-full px-4">

  <div class="mx-auto w-fit">

    <div class="flex items-center justify-center gap-10
                bg-gray-700
                backdrop-blur-xl
                border border-white/10
                rounded-full
                px-10 py-4
                shadow-2xl">

      <nav class="hidden md:flex items-center gap-8">
        <a href="#about" class="nav-link active-link">ABOUT</a>
        <a href="#education" class="nav-link">PENDIDIKAN</a>
        <a href="#skills" class="nav-link">SKILLS</a>
        <a href="#certification" class="nav-link">CERTIFICATION</a>
        <a href="#project" class="nav-link">PROJECT</a>
        <a href="#contact" class="nav-link">CONTACT</a>
      </nav>

      <button id="burger-btn"
        class="md:hidden text-white text-2xl">
        <i class="fas fa-bars"></i>
      </button>

    </div>

  </div>

  <div id="mobile-menu"
      class="hidden mt-4 md:hidden flex flex-col space-y-3
            bg-gray-700 backdrop-blur-xl
            rounded-2xl p-5 text-center">

    <a class="hover:underline text-white" href="#about">ABOUT</a>
    <a class="hover:underline text-white" href="#education">EDUCATION</a>
    <a class="hover:underline text-white" href="#skills">SKILLS</a>
    <a class="hover:underline text-white" href="#certification">CERTIFICATION</a>
    <a class="hover:underline text-white" href="#project">PROJECT</a>
    <a class="hover:underline text-white" href="#contact">CONTACT</a>

  </div>

</header>

<button 
  id="toTopBtn"
  class="fixed bottom-6 right-6 bg-gray-700 hover:bg-gray-900 
         text-white w-12 h-12 rounded-full shadow-lg 
         hidden transition duration-300 z-50">
  ↑
</button>

<div id="about-container"></div>
<div id="education-container"></div>
<div id="skills-container"></div>
<div id="certification-container"></div>
<div id="project-container"></div>
<div id="contact-container"></div>


<footer class="bg-gray-800 text-xs text-white text-center py-2">
  <p>© 2026 Nurul Fadhila. All Rights Reserved.</p>
</footer>

<script src="script.js"></script>

</body>
</html>
